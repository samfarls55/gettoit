# Manual native UI screenshot exporter for the local /ui-lab.
#
# This workflow is intentionally separate from ci.yml. The main CI workflow
# also uses workflow_dispatch for TestFlight retries, so keeping UI snapshots
# here prevents a screenshot refresh from accidentally running upload lanes.
name: ios-ui-snapshots

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ui-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-ui-snapshots:
    name: ios (UI lab screenshots)
    runs-on: macos-14
    env:
      GTI_UI_LAB_SCREENSHOT_DIR: ${{ github.workspace }}/ios-ui-lab-screenshots
    steps:
      - uses: actions/checkout@v4

      - name: Select highest installed Xcode
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show Xcode + simulator info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Export UI lab screenshots
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p "$GTI_UI_LAB_SCREENSHOT_DIR"
          RUNTIME=$(xcrun simctl list runtimes | awk '/iOS 17/ {print $2}' | sort -V | tail -1)
          if [ -z "$RUNTIME" ]; then
            echo "No iOS 17 runtime available on this runner" >&2
            exit 1
          fi
          echo "Using iOS runtime: $RUNTIME"

          xcodebuild test \
            -project GetToIt.xcodeproj \
            -scheme GetToIt \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=$RUNTIME" \
            -only-testing:GetToItTests/UiLabScreenshotExportTests/testExportUiLabScreenshots \
            GTI_UI_LAB_SCREENSHOT_DIR="$GTI_UI_LAB_SCREENSHOT_DIR" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI lab screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-lab-screenshots
          path: ios-ui-lab-screenshots/*.png
          if-no-files-found: error
