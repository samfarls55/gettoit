# GetToIt CI — single workflow, lanes per ADR 0004 §"One CI lane".
#
# Lanes:
#   * mobile         — Ubuntu, runs TypeScript + Jest checks for the
#                      active React Native / Expo app in `mobile/`.
#   * edge           — Ubuntu, runs `deno test` over `supabase/functions/`.
#   * web            — Ubuntu, runs `next build` over `web/`.
#   * supabase-db    — Ubuntu, runs `supabase db push --linked` against
#                      the gettoit-prod project. Idempotent; appends only.
#   * invite-link-canary — Ubuntu, curls a canary invite URL on gettoit.app
#                      and asserts non-404. Regression guard for bug-01
#                      (2026-05-14 invite-link 404). Runs after
#                      the `web` lane so a same-PR web break trips that
#                      lane first; canary is the live-plumbing guard for
#                      issues the `next build` step cannot see (Vercel
#                      framework preset, DNS, AASA serving).
#   * aasa-validator — Ubuntu, fetches the live AASA file from gettoit.app
#                      and Apple's CDN, asserts JSON validity,
#                      `application/json` content-type, and that
#                      `/join/*` is registered in the components array.
#                      Regression guard for bug-01 AASA half. Runs in
#                      parallel with `invite-link-canary`.
name: ci

on:
  push:
    branches: [main]
    # Docs-only changes never affect any build lane, so skip the whole
    # workflow for them — no runners spun up, and (the real win) a
    # docs-only push can't cancel a code build already in flight via the
    # `concurrency` group below. `gti-vault/**` is the Obsidian knowledge
    # base (issue files, AFK run logs, _index.md churn — never source);
    # `docs/**` is agent/runbook docs; `*.md` is root-only (AGENTS.md,
    # CLAUDE.md shim, CONTEXT.md, README).
    paths-ignore:
      - 'gti-vault/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'gti-vault/**'
      - 'docs/**'
      - '*.md'
  # Manual re-trigger surface for lanes that are idempotent enough to
  # re-run safely.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (tsc + next build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # `tsc --noEmit` over the whole web project — test files included.
      # `next build` only type-checks files in the build graph, so type
      # errors confined to test files (bug-18) shipped silently green
      # before this gate.
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  mobile:
    name: mobile (tsc + jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run verify

  invite-link-canary:
    # Live-plumbing regression guard for bug-01 (2026-05-14
    # invite-link 404). The bug was a Vercel framework-preset misconfig: AASA
    # in /public/ served while every Next.js route 404'd. Unit tests + the
    # local `next build` couldn't catch it because the failure was at the
    # deployed-platform layer, not in the code. This canary asserts the live
    # /join/<id> route still returns a non-404 on every PR + push to main.
    #
    # Canary path uses a stable, never-going-to-resolve-server-side roomId.
    # The route is dynamic ([roomId]) so any value renders; we don't need
    # a real session. `curl -I` is enough — we only care that the route
    # exists, not the body.
    #
    # `needs: web` so a same-PR web break trips that lane's `next build`
    # first; this canary is for issues `next build` cannot see.
    name: invite-link-canary (curl join route)
    needs: web
    runs-on: ubuntu-latest
    steps:
      - name: Curl https://gettoit.app/join/<canary> and assert non-404
        run: |
          set -euo pipefail
          URL="https://gettoit.app/join/ci-canary-bug-01-regression-test"
          echo "Probing: $URL"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -I "$URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "404" ]; then
            echo "FAIL: invite-link canary returned 404 — bug-01 regression." >&2
            echo "Likely causes: Vercel framework preset reverted to 'Other'," >&2
            echo "/join/[roomId]/page.tsx removed from web/app/, or DNS broken." >&2
            exit 1
          fi
          if [ "${STATUS:0:1}" = "5" ]; then
            echo "FAIL: invite-link canary returned $STATUS (5xx)." >&2
            exit 1
          fi
          echo "OK: invite-link canary returned $STATUS."

  aasa-validator:
    # Companion regression guard for bug-01. Asserts the live AASA file
    # served at https://gettoit.app/.well-known/apple-app-site-association
    # is (a) reachable, (b) served with content-type application/json
    # (Universal Links won't resolve otherwise), (c) valid JSON, and
    # (d) registers the /join/* path the mobile app opens. Also checks
    # Apple's CDN view of the file, which is what iOS actually consults.
    #
    # No external validator service — Apple's official `swcutil` is
    # macOS-only and Apple's web validator has no stable API. We do the
    # checks ourselves with curl + jq, which keeps the lane Ubuntu-only
    # and dependency-free.
    name: aasa-validator (live AASA file)
    needs: web
    runs-on: ubuntu-latest
    steps:
      - name: Validate https://gettoit.app/.well-known/apple-app-site-association
        run: |
          set -euo pipefail
          AASA_URL="https://gettoit.app/.well-known/apple-app-site-association"
          echo "Fetching: $AASA_URL"

          # Header check: must be reachable and served as application/json.
          # Vercel's `headers` rule in web/vercel.json enforces this; we
          # re-assert here because a future vercel.json edit could silently
          # break Universal Links (iOS only accepts application/json).
          HEADERS=$(curl -sS -D - -o /dev/null "$AASA_URL")
          STATUS=$(echo "$HEADERS" | awk 'NR==1 {print $2}')
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: AASA returned HTTP $STATUS, expected 200." >&2
            echo "$HEADERS" >&2
            exit 1
          fi
          CT=$(echo "$HEADERS" | awk -F': ' 'tolower($1)=="content-type" {print tolower($2)}' | tr -d '\r')
          case "$CT" in
            application/json*) echo "OK: content-type=$CT" ;;
            *)
              echo "FAIL: AASA content-type is '$CT', expected application/json." >&2
              echo "iOS Universal Links require application/json; other types are ignored." >&2
              exit 1
              ;;
          esac

          # Body check: must be valid JSON with the /join/* component
          # registered for the GetToIt app ID.
          BODY=$(curl -sS "$AASA_URL")
          echo "$BODY" | jq -e . >/dev/null || {
            echo "FAIL: AASA body is not valid JSON." >&2
            echo "$BODY" >&2
            exit 1
          }
          # `.applinks.details[].components[] | .["/"]` extracts the path
          # glob from each component object. Universal Links uses the
          # `"/"` key for the path pattern (legacy and modern AASA shape).
          HAS_JOIN=$(echo "$BODY" | jq -r '
            .applinks.details[]?.components[]?["/"]? // empty
          ' | grep -F '/join/*' || true)
          if [ -z "$HAS_JOIN" ]; then
            echo "FAIL: AASA does not register /join/* — invite Universal Link will fall back to the browser." >&2
            echo "Components found:" >&2
            echo "$BODY" | jq '.applinks.details[]?.components' >&2
            exit 1
          fi
          echo "OK: AASA registers /join/* for the GetToIt app ID."

      - name: Validate Apple-CDN-cached copy
        # Apple proxies the AASA file through app-site-association.cdn-apple.com
        # for newer iOS releases; iOS consults the CDN copy rather than
        # the origin. If Apple hasn't ingested the file (e.g. JSON was
        # malformed at the moment Apple's fetcher ran), Universal Links
        # silently fail even though the origin is healthy. We assert
        # parity here.
        run: |
          set -euo pipefail
          CDN_URL="https://app-site-association.cdn-apple.com/a/v1/gettoit.app"
          echo "Fetching: $CDN_URL"
          BODY=$(curl -sS "$CDN_URL")
          echo "$BODY" | jq -e . >/dev/null || {
            echo "FAIL: Apple CDN copy is not valid JSON — Apple has not ingested the file." >&2
            echo "$BODY" >&2
            exit 1
          }
          HAS_JOIN=$(echo "$BODY" | jq -r '
            .applinks.details[]?.components[]?["/"]? // empty
          ' | grep -F '/join/*' || true)
          if [ -z "$HAS_JOIN" ]; then
            echo "FAIL: Apple CDN copy does not register /join/*." >&2
            echo "$BODY" | jq '.applinks.details[]?.components' >&2
            exit 1
          fi
          echo "OK: Apple CDN copy registers /join/*."

  edge:
    name: supabase/functions (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: deno test (supabase/functions)
        working-directory: supabase/functions
        run: deno test --allow-net --allow-env --allow-read

  supabase-db:
    name: supabase (db push)
    runs-on: ubuntu-latest
    # Only push when the migrations directory actually changes. This avoids
    # burning the rate-limited Supabase API tokens.
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip when credentials are missing
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase credentials not set on this build — skipping db push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Supabase CLI
        if: steps.gate.outputs.skip == 'false'
        uses: supabase/setup-cli@v1
        with:
          version: v2.105.0
      - name: supabase db push (linked project)
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all
      - name: Seed app_config.service_role_key (bug-09)
        # bug-09: the verdict-fire dispatcher (`dispatch_compute_verdict`)
        # reads its service-role key from the `app_config` table. The
        # non-secret `supabase_url` row is seeded by the committed
        # migration; the secret `service_role_key` row must NOT be
        # committed, so it is re-applied here on every deploy from the
        # `SUPABASE_SERVICE_ROLE_KEY` Actions secret. A plain
        # `INSERT ... ON CONFLICT` needs no superuser — that is the
        # whole point of the GUC -> table re-scope. ON CONFLICT keeps it
        # idempotent; a project re-provision self-heals on the next
        # deploy with no manual action.
        #
        # The INSERT runs against the live DB via the Management API
        # /database/query endpoint (the job already authenticates with
        # SUPABASE_ACCESS_TOKEN). The key value is passed to the request
        # body via an env var and never echoed; `set +x` keeps it out of
        # the run log even on failure.
        if: steps.gate.outputs.skip == 'false'
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          set +x
          if [ -z "${SERVICE_ROLE_KEY:-}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY secret is not set — the verdict" >&2
            echo "dispatcher would silently no-op (bug-09). Set the repo secret." >&2
            exit 1
          fi
          # SQL-escape the key value: double every single quote so it is
          # a safe single-quoted SQL string literal. (A Supabase
          # service-role key is a JWT and contains no quotes, but the
          # escape keeps the statement correct regardless.)
          KEY_ESC=$(printf '%s' "$SERVICE_ROLE_KEY" | sed "s/'/''/g")
          SQL="insert into public.app_config (key, value) values ('service_role_key', '${KEY_ESC}') on conflict (key) do update set value = excluded.value;"
          # Hand the statement to the Management API as a JSON body.
          # jq --arg JSON-escapes the SQL and keeps the key out of the
          # process arg list.
          BODY=$(jq -n --arg q "$SQL" '{query: $q}')
          HTTP=$(curl -sS -o /tmp/seed-resp.json -w "%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          if [ "${HTTP:0:1}" != "2" ]; then
            echo "FAIL: seeding app_config.service_role_key returned HTTP $HTTP." >&2
            # The response body cannot contain the key — safe to print.
            cat /tmp/seed-resp.json >&2 || true
            exit 1
          fi
          echo "OK: app_config.service_role_key seeded (HTTP $HTTP)."

  edge-deploy:
    name: supabase (functions deploy)
    # tb-14: closes the deploy gap. The `edge` lane only deno-tests the
    # Edge Function source; the `supabase-db` lane only pushes
    # migrations. Nothing ever ran `supabase functions deploy`, so
    # `places-proxy` (and the other functions) stayed dark on the live
    # project — every quiz session fell through to the on-device MapKit
    # fallback because the proxy never reached Foursquare.
    #
    # This lane deploys the functions and pushes their server-side
    # secrets after the migration push, so the `places` cache table the
    # `places-proxy` handler upserts into already exists.
    #
    # push-to-main only: deploying on a PR would race the supabase-db
    # push and could ship a function ahead of the migration it depends
    # on. workflow_dispatch is allowed so a transient deploy failure can
    # be retried without a code change. The lane skips itself when the
    # Supabase credentials are absent (fork / unconfigured clone).
    needs: supabase-db
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # tb-WF-13 — the AES-GCM key the mint-claim-code function encrypts
      # the web refresh token under. A base64-encoded 32-byte key. When
      # absent the function still deploys but returns
      # `mint_claim_code_misconfigured` until the secret is added.
      CLAIM_CODE_ENC_KEY: ${{ secrets.CLAIM_CODE_ENC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip when credentials are missing
        id: gate
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase credentials not set on this build — skipping functions deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Supabase CLI
        if: steps.gate.outputs.skip == 'false'
        uses: supabase/setup-cli@v1
        with:
          version: v2.105.0
      - name: supabase secrets set (Edge Function runtime secrets)
        # The places-proxy handler reads FOURSQUARE_API_KEY from the
        # function runtime environment; a missing key makes it return
        # `places_proxy_misconfigured`. SUPABASE_URL and
        # SUPABASE_SERVICE_ROLE_KEY are injected automatically by the
        # Supabase platform on every function — they do not need to be
        # set here. We push the Foursquare key before the deploy so the
        # function is live and configured in one CI run.
        #
        # tb-WF-13 / tb-WF-14 — CLAIM_CODE_ENC_KEY (the AES-GCM key the
        # mint-claim-code function encrypts the web refresh token under
        # and the redeem-claim-code function decrypts it with) is pushed
        # here too WHEN PRESENT. Unlike FOURSQUARE_API_KEY a missing
        # CLAIM_CODE_ENC_KEY does not fail the lane — it is a new secret;
        # both functions still deploy and return
        # `mint_claim_code_misconfigured` / `redeem_claim_code_misconfigured`
        # until the repo secret is added. Generate a key with:
        #   `openssl rand -base64 32`
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          if [ -z "${FOURSQUARE_API_KEY:-}" ]; then
            echo "FOURSQUARE_API_KEY secret is not set — places-proxy would" >&2
            echo "return places_proxy_misconfigured. Set the repo secret." >&2
            exit 1
          fi
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_REF" \
            FOURSQUARE_API_KEY="$FOURSQUARE_API_KEY"
          if [ -n "${GOOGLE_PLACES_API_KEY:-}" ]; then
            supabase secrets set \
              --project-ref "$SUPABASE_PROJECT_REF" \
              GOOGLE_PLACES_API_KEY="$GOOGLE_PLACES_API_KEY"
          else
            echo "GOOGLE_PLACES_API_KEY repo secret is not set -" >&2
            echo "google-places-readiness requires it to already exist as" >&2
            echo "a Supabase Edge Function secret." >&2
          fi
          if [ -n "${CLAIM_CODE_ENC_KEY:-}" ]; then
            supabase secrets set \
              --project-ref "$SUPABASE_PROJECT_REF" \
              CLAIM_CODE_ENC_KEY="$CLAIM_CODE_ENC_KEY"
          else
            echo "CLAIM_CODE_ENC_KEY secret is not set — mint-claim-code and" >&2
            echo "redeem-claim-code will return *_misconfigured until it is" >&2
            echo "added." >&2
          fi
      - name: supabase functions deploy (places-proxy + companions)
        # Deploy every Edge Function in supabase/functions/. `_shared`
        # and `_smoke_test.ts` are not functions (no own directory with
        # an index.ts) and are skipped by the CLI. places-proxy is
        # named explicitly first so the log makes the tb-14 fix obvious.
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          supabase functions deploy places-proxy \
            --project-ref "$SUPABASE_PROJECT_REF"
          for fn in google-places-readiness apns-sender compute-verdict delete-user mint-claim-code redeem-claim-code; do
            echo "Deploying $fn"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF"
          done
      - name: Verify places-proxy reaches Foursquare (live)
        # tb-14 acceptance criterion #4 — post-deploy smoke test. The
        # live integration test invokes the just-deployed function with
        # a known dense-urban coordinate and asserts a Foursquare-sourced
        # response (non-empty places, is_thin:false, no mapkit:-prefixed
        # ids). It is credential-gated and self-skips when
        # SUPABASE_PROJECT_URL / SUPABASE_ANON_KEY are absent — here they
        # are present, so the assertion runs for real and fails the lane
        # if the deployed function is still dark.
        if: steps.gate.outputs.skip == 'false'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: deno test (places-proxy live integration)
        if: steps.gate.outputs.skip == 'false'
        working-directory: supabase/functions
        run: |
          deno test --allow-net --allow-env --allow-read places-proxy/live-integration.test.ts
          deno test --allow-net --allow-env --allow-read google-places-readiness/live-integration.test.ts
