# GetToIt CI — single workflow, lanes per ADR 0004 §"One CI lane".
#
# Lanes:
#   * design-system  — Node 20, runs `verify.mjs` (CSS + Swift drift gate
#                      + orphan-hex sweep + surface↔jsx pairing).
#   * ios            — macOS, generates the Xcode project via XcodeGen
#                      and runs the unit + integration tests on the
#                      iOS 17 simulator.
#   * edge           — Ubuntu, runs `deno test` over `supabase/functions/`.
#   * web            — Ubuntu, runs `next build` over `web/`.
#   * supabase-db    — Ubuntu, runs `supabase db push --linked` against
#                      the gettoit-prod project so iOS integration tests
#                      see the latest schema. Idempotent; appends only.
#                      iOS lane depends on this so freshly-landed migrations
#                      are live before the test bundle runs against them.
#   * invite-link-canary — Ubuntu, curls a canary invite URL on gettoit.app
#                      and asserts non-404. Regression guard for bug-01
#                      (TestFlight 2026-05-14 invite-link 404). Runs after
#                      the `web` lane so a same-PR web break trips that
#                      lane first; canary is the live-plumbing guard for
#                      issues the `next build` step cannot see (Vercel
#                      framework preset, DNS, AASA serving).
#   * aasa-validator — Ubuntu, fetches the live AASA file from gettoit.app
#                      and Apple's CDN, asserts JSON validity,
#                      `application/json` content-type, and that
#                      `/join/*` is registered in the components array.
#                      Regression guard for bug-01 AASA half. Runs in
#                      parallel with `invite-link-canary`.
#   * testflight     — macOS, archives + uploads to TestFlight on push-to-
#                      main. Gated on the `ios` lane being green. Skips
#                      itself when the App Store Connect API key secrets
#                      aren't configured (so PRs and unconfigured branches
#                      don't fail). See `ios/README.md` §TestFlight setup.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-trigger surface for the `testflight` job (and any other
  # lane that's idempotent enough to re-run safely). Useful when a
  # transient App Store Connect upload failure needs a retry without
  # pushing a code change.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  design-system:
    name: design-system (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify design system (drift gate + orphan-hex sweep)
        run: node design-system/scripts/verify.mjs

  web:
    name: web (next build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  invite-link-canary:
    # Live-plumbing regression guard for bug-01 (v1.1 — TestFlight 2026-05-14
    # invite-link 404). The bug was a Vercel framework-preset misconfig: AASA
    # in /public/ served while every Next.js route 404'd. Unit tests + the
    # local `next build` couldn't catch it because the failure was at the
    # deployed-platform layer, not in the code. This canary asserts the live
    # /join/<id> route still returns a non-404 on every PR + push to main.
    #
    # Canary path uses a stable, never-going-to-resolve-server-side roomId.
    # The route is dynamic ([roomId]) so any value renders; we don't need
    # a real session. `curl -I` is enough — we only care that the route
    # exists, not the body.
    #
    # `needs: web` so a same-PR web break trips that lane's `next build`
    # first; this canary is for issues `next build` cannot see.
    name: invite-link-canary (curl join route)
    needs: web
    runs-on: ubuntu-latest
    steps:
      - name: Curl https://gettoit.app/join/<canary> and assert non-404
        run: |
          set -euo pipefail
          URL="https://gettoit.app/join/ci-canary-bug-01-regression-test"
          echo "Probing: $URL"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -I "$URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "404" ]; then
            echo "FAIL: invite-link canary returned 404 — bug-01 regression." >&2
            echo "Likely causes: Vercel framework preset reverted to 'Other'," >&2
            echo "/join/[roomId]/page.tsx removed from web/app/, or DNS broken." >&2
            exit 1
          fi
          if [ "${STATUS:0:1}" = "5" ]; then
            echo "FAIL: invite-link canary returned $STATUS (5xx)." >&2
            exit 1
          fi
          echo "OK: invite-link canary returned $STATUS."

  aasa-validator:
    # Companion regression guard for bug-01. Asserts the live AASA file
    # served at https://gettoit.app/.well-known/apple-app-site-association
    # is (a) reachable, (b) served with content-type application/json
    # (Universal Links won't resolve otherwise), (c) valid JSON, and
    # (d) registers the /join/* path the iOS app's InviteLink generator
    # produces. Also checks Apple's CDN view of the file, which is what
    # iOS actually consults.
    #
    # No external validator service — Apple's official `swcutil` is
    # macOS-only and Apple's web validator has no stable API. We do the
    # checks ourselves with curl + jq, which keeps the lane Ubuntu-only
    # and dependency-free.
    name: aasa-validator (live AASA file)
    needs: web
    runs-on: ubuntu-latest
    steps:
      - name: Validate https://gettoit.app/.well-known/apple-app-site-association
        run: |
          set -euo pipefail
          AASA_URL="https://gettoit.app/.well-known/apple-app-site-association"
          echo "Fetching: $AASA_URL"

          # Header check: must be reachable and served as application/json.
          # Vercel's `headers` rule in web/vercel.json enforces this; we
          # re-assert here because a future vercel.json edit could silently
          # break Universal Links (iOS only accepts application/json).
          HEADERS=$(curl -sS -D - -o /dev/null "$AASA_URL")
          STATUS=$(echo "$HEADERS" | awk 'NR==1 {print $2}')
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: AASA returned HTTP $STATUS, expected 200." >&2
            echo "$HEADERS" >&2
            exit 1
          fi
          CT=$(echo "$HEADERS" | awk -F': ' 'tolower($1)=="content-type" {print tolower($2)}' | tr -d '\r')
          case "$CT" in
            application/json*) echo "OK: content-type=$CT" ;;
            *)
              echo "FAIL: AASA content-type is '$CT', expected application/json." >&2
              echo "iOS Universal Links require application/json; other types are ignored." >&2
              exit 1
              ;;
          esac

          # Body check: must be valid JSON with the /join/* component
          # registered for the GetToIt app ID.
          BODY=$(curl -sS "$AASA_URL")
          echo "$BODY" | jq -e . >/dev/null || {
            echo "FAIL: AASA body is not valid JSON." >&2
            echo "$BODY" >&2
            exit 1
          }
          # `.applinks.details[].components[] | .["/"]` extracts the path
          # glob from each component object. Universal Links uses the
          # `"/"` key for the path pattern (legacy and modern AASA shape).
          HAS_JOIN=$(echo "$BODY" | jq -r '
            .applinks.details[]?.components[]?["/"]? // empty
          ' | grep -F '/join/*' || true)
          if [ -z "$HAS_JOIN" ]; then
            echo "FAIL: AASA does not register /join/* — invite Universal Link will fall back to the browser." >&2
            echo "Components found:" >&2
            echo "$BODY" | jq '.applinks.details[]?.components' >&2
            exit 1
          fi
          echo "OK: AASA registers /join/* for the GetToIt app ID."

      - name: Validate Apple-CDN-cached copy
        # Apple proxies the AASA file through app-site-association.cdn-apple.com
        # for newer iOS releases; iOS consults the CDN copy rather than
        # the origin. If Apple hasn't ingested the file (e.g. JSON was
        # malformed at the moment Apple's fetcher ran), Universal Links
        # silently fail even though the origin is healthy. We assert
        # parity here.
        run: |
          set -euo pipefail
          CDN_URL="https://app-site-association.cdn-apple.com/a/v1/gettoit.app"
          echo "Fetching: $CDN_URL"
          BODY=$(curl -sS "$CDN_URL")
          echo "$BODY" | jq -e . >/dev/null || {
            echo "FAIL: Apple CDN copy is not valid JSON — Apple has not ingested the file." >&2
            echo "$BODY" >&2
            exit 1
          }
          HAS_JOIN=$(echo "$BODY" | jq -r '
            .applinks.details[]?.components[]?["/"]? // empty
          ' | grep -F '/join/*' || true)
          if [ -z "$HAS_JOIN" ]; then
            echo "FAIL: Apple CDN copy does not register /join/*." >&2
            echo "$BODY" | jq '.applinks.details[]?.components' >&2
            exit 1
          fi
          echo "OK: Apple CDN copy registers /join/*."

  edge:
    name: supabase/functions (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: deno test (supabase/functions)
        working-directory: supabase/functions
        run: deno test --allow-net --allow-env --allow-read

  supabase-db:
    name: supabase (db push)
    runs-on: ubuntu-latest
    # Only push when the migrations directory actually changes — keeps
    # design-system-only PRs from hitting the prod DB unnecessarily and
    # avoids burning the rate-limited supabase API tokens.
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip when credentials are missing
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase credentials not set on this build — skipping db push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Supabase CLI
        if: steps.gate.outputs.skip == 'false'
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: supabase db push (linked project)
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all

  ios:
    name: ios (xcodebuild test)
    needs: supabase-db
    runs-on: macos-14
    env:
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select highest installed Xcode
        # XcodeGen 2.45+ emits objectVersion 77, which only Xcode 16+ can open.
        # Pinning a specific Xcode version is fragile across image refreshes,
        # so pick the highest /Applications/Xcode_*.app on the runner.
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show Xcode + simulator info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build + test on iOS 17 simulator
        working-directory: ios
        run: |
          set -euo pipefail
          # Pick the highest-version iOS 17 simulator runtime available on
          # the runner. macOS-14 images may carry 17.2, 17.4, or 17.5 — we
          # use whatever exists rather than pinning a version that may
          # disappear at the next image refresh.
          RUNTIME=$(xcrun simctl list runtimes | awk '/iOS 17/ {print $2}' | sort -V | tail -1)
          if [ -z "$RUNTIME" ]; then
            echo "No iOS 17 runtime available on this runner" >&2
            exit 1
          fi
          echo "Using iOS runtime: $RUNTIME"

          xcodebuild test \
            -project GetToIt.xcodeproj \
            -scheme GetToIt \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=$RUNTIME" \
            -resultBundlePath TestResults.xcresult \
            SUPABASE_PROJECT_URL="$SUPABASE_PROJECT_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload xcresult bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          if-no-files-found: ignore

  testflight:
    name: testflight (archive + upload)
    # Only after the iOS test lane is green. ios already depends on
    # supabase-db, so the chain is db push → tests → archive/upload.
    needs: ios
    # macos-15+ for Xcode 26 / iOS 26 SDK. Apple's App Store Connect
    # validation rejects uploads built with older SDKs ("Apps built with
    # Xcode older than 26 are no longer accepted"). The `ios` test lane
    # stays on macos-14 — simulator tests run fine on the older image and
    # the highest-installed-Xcode picker will choose whatever's there.
    runs-on: macos-15
    # Push-to-main only. PRs and feature branches never upload (no
    # build-number coordination, no review queue). workflow_dispatch
    # is included so the user can re-trigger an upload manually if a
    # transient ASC issue caused the first attempt to fail.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    env:
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
    steps:
      - uses: actions/checkout@v4

      - name: Gate when App Store Connect credentials are missing
        # When the API-key secrets aren't configured (e.g. a fork, or
        # a fresh clone of this repo before the user has run through
        # `ios/README.md` §TestFlight setup), skip the rest of this
        # job so the workflow doesn't go red. The user only sees a
        # green checkmark on this job once the secrets exist.
        id: gate
        run: |
          set -euo pipefail
          if [ -z "$APP_STORE_CONNECT_API_KEY_ID" ] \
             || [ -z "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" ] \
             || [ -z "$APP_STORE_CONNECT_API_KEY_CONTENT" ]; then
            echo "App Store Connect API key not configured — skipping TestFlight upload."
            echo "See ios/README.md §TestFlight setup for the one-time HITL setup."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select highest installed Xcode
        # Same logic as the ios lane — XcodeGen 2.45+ emits objectVersion
        # 77 which only Xcode 16+ can open, and pinning a specific Xcode
        # version is fragile across image refreshes.
        if: steps.gate.outputs.skip == 'false'
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        if: steps.gate.outputs.skip == 'false'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: xcodegen generate

      - name: Stage App Store Connect API key
        # `xcodebuild -authenticationKey*` flags and `xcrun altool
        # --apiKey/--apiIssuer` both read the `.p8` key from
        # `~/.appstoreconnect/private_keys/AuthKey_<KEY_ID>.p8` by
        # convention. We decode the base64-encoded secret into that
        # path so both tools find it without further wiring.
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Archive (Release, signed)
        # CURRENT_PROJECT_VERSION is sourced from $GITHUB_RUN_NUMBER so
        # every push gets a unique, monotonically-increasing build
        # number — TestFlight rejects duplicates within the same
        # CFBundleShortVersionString. CFBundleVersion in project.yml is
        # `$(CURRENT_PROJECT_VERSION)` so Xcode substitutes this value
        # into the generated Info.plist at build time.
        #
        # `-allowProvisioningUpdates` + the ASC API key tells xcodebuild
        # to auto-create the distribution certificate and provisioning
        # profile on first run. Subsequent runs reuse what's already
        # registered.
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project GetToIt.xcodeproj \
            -scheme GetToIt \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/GetToIt.xcarchive \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            SUPABASE_PROJECT_URL="$SUPABASE_PROJECT_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WXTMNYM34A \
            | tee xcodebuild-archive.log

      - name: Export archive (App Store)
        # exportOptions.plist pins method=app-store, team, and
        # signingStyle=automatic. xcodebuild needs the API-key flags
        # again here because export re-signs the .ipa.
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/GetToIt.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            | tee xcodebuild-export.log

      - name: Re-sign .app with full entitlements
        # WORKAROUND: xcodebuild archive runs ProcessProductPackaging
        # before automatic signing has finalized an identity. Because
        # the GetToIt target's base settings carry CODE_SIGN_IDENTITY=""
        # (the only configuration we have found that lets xcodebuild
        # archive + Release + automatic + -allowProvisioningUpdates
        # actually produce a distribution-signed .ipa — see project.yml
        # comment block), xcodebuild logs:
        #
        #   warning: GetToIt isn't code signed but requires entitlements.
        #
        # ...and skips applying Sources/App/GetToIt.entitlements. The
        # resulting binary ends up with only the four default entitlements
        # from the provisioning profile (application-identifier,
        # beta-reports-active, team-identifier, get-task-allow). The
        # provisioning profile itself already declares the full set
        # (Sign in with Apple, associated-domains, aps-environment,
        # keychain-access-groups), but the binary has them stripped.
        # On-device this surfaces as ASAuthorizationError.unknown (#1000)
        # for SIWA before any UI presents.
        #
        # This step re-signs the .app inside the exported .ipa using
        # codesign with --entitlements pointing at our entitlements
        # file. The distribution identity is already in the keychain
        # (placed there by the archive step), and the new entitlements
        # are a strict subset of what the provisioning profile allows,
        # so the re-sign succeeds and the resulting .ipa passes
        # App Store ingest.
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: |
          set -euo pipefail
          IPA=$(ls build/export/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "No .ipa produced by exportArchive — cannot re-sign" >&2
            exit 1
          fi
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep -E "Apple Distribution|iPhone Distribution" \
            | head -1 \
            | sed -E 's/^[[:space:]]*[0-9]+\)[[:space:]]+[A-F0-9]+[[:space:]]+"([^"]+)".*$/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No distribution code-signing identity found in keychain:" >&2
            security find-identity -v -p codesigning >&2
            exit 1
          fi
          echo "Re-signing with identity: $IDENTITY"
          WORK=build/resign
          rm -rf "$WORK"
          mkdir -p "$WORK"
          (cd "$WORK" && unzip -q "../../$IPA")
          APP=$(ls -d "$WORK"/Payload/*.app | head -1)
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "Could not locate .app inside extracted IPA" >&2
            exit 1
          fi
          # Force re-sign with full entitlements file. --preserve-metadata
          # keeps the bundle identifier and designated requirements; the
          # entitlements blob is fully replaced from our file.
          codesign --force \
            --sign "$IDENTITY" \
            --entitlements Sources/App/GetToIt.entitlements \
            --generate-entitlement-der \
            --preserve-metadata=identifier,requirements \
            --timestamp=none \
            "$APP"
          echo "Post-resign entitlements:"
          codesign -d --entitlements :- "$APP"
          # Re-pack into the same .ipa path so the existing upload
          # step picks it up unchanged.
          rm -f "$IPA"
          (cd "$WORK" && zip -qry "../../$IPA" Payload)
          echo "Re-signed and re-packed: $IPA"

      - name: Dump embedded entitlements + provisioning profile (diag)
        # DIAGNOSTIC (temp): unpack the .ipa and print the embedded
        # entitlements + the embedded.mobileprovision capabilities to
        # the CI log. Used to diagnose the post-bug-06 SIWA #1000
        # failure on TestFlight build 128 — symptoms suggest the
        # automatic-signing profile may not carry
        # com.apple.developer.applesignin even though the entitlement
        # file declares it. Remove this step once root cause is known.
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: |
          set -euo pipefail
          IPA=$(ls build/export/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "No .ipa to inspect — export step failed" >&2
            exit 1
          fi
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(ls -d "$WORK"/Payload/*.app | head -1)
          echo "=== EMBEDDED ENTITLEMENTS (from binary) ==="
          codesign -d --entitlements :- "$APP" || true
          echo ""
          echo "=== EMBEDDED PROVISIONING PROFILE ==="
          security cms -D -i "$APP/embedded.mobileprovision" || true
          echo ""
          echo "=== PROFILE ENTITLEMENT KEYS ONLY ==="
          security cms -D -i "$APP/embedded.mobileprovision" \
            | plutil -extract Entitlements xml1 -o - - \
            | grep -E "<key>" || true

      - name: Upload to TestFlight
        # altool reads the same .p8 key from ~/.appstoreconnect via
        # --apiKey/--apiIssuer. The build appears in the TestFlight
        # tab a few minutes later (after Apple's automated processing).
        # Internal testers can install once it finishes processing;
        # external testers require beta-app-review (TB-17 HITL).
        if: steps.gate.outputs.skip == 'false'
        working-directory: ios
        run: |
          set -euo pipefail
          IPA=$(ls build/export/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "No .ipa produced by exportArchive — check xcodebuild-export.log" >&2
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-artifacts
          path: |
            ios/xcodebuild-archive.log
            ios/xcodebuild-export.log
            ios/build/GetToIt.xcarchive
          if-no-files-found: ignore
