# Supabase CLI configuration for GetToIt.
# Linked project ref is recorded in supabase/.temp/project-ref (gitignored).

project_id = "gettoit"

[db]
# Major version of the Postgres server the project runs against.
major_version = 15

[db.migrations]
schema_paths = []

[auth]
# Anonymous sign-ins are how v1 onboarding works — every invitee
# authenticates anonymously before quizzing (PRD user story 15,
# ADR 0007).
enable_anonymous_sign_ins = true
