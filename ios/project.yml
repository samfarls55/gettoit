# XcodeGen spec for the GetToIt iOS app.
#
# Why XcodeGen: the .xcodeproj is generated from this YAML in CI on the
# macOS runner, so we don't commit Xcode-managed binary `project.pbxproj`
# files that would race on every change. Regenerate locally with
# `xcodegen generate` from this directory (`ios/`).
name: GetToIt
options:
  bundleIdPrefix: app.gettoit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Apply consistent build settings to every target.
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    # Tracks the v2 line. supabase-swift requires iOS 13+; we target iOS 17.
    from: "2.0.0"

targets:
  GetToIt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: GetToIt
        CFBundleShortVersionString: "0.1.0"
        # CFBundleVersion is sourced from the CURRENT_PROJECT_VERSION
        # build setting (default "1" below). The TestFlight CI lane
        # overrides this via `xcodebuild ... CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER`
        # so each upload gets a unique, monotonically-increasing
        # build number — TestFlight rejects duplicates.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # CFBundleIconName binds the Info.plist to the asset-catalog set
        # at Sources/Assets.xcassets/AppIcon.appiconset. App Store Connect
        # validation rejects uploads without this key when an icon set is
        # present.
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        # v1 is iPhone-only, portrait-only (see design-system/surfaces/).
        # App Store Connect requires this key to be present for iOS apps.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Location-permission purpose string. PlacesService.swift +
        # MapKitPlacesFallback.swift both import CoreLocation, which makes
        # this key mandatory at App Store ingest (ITMS-90683 warning on
        # build 125, 2026-05-14). String voice matches surface S00b
        # pre-prime body copy for continuity across pre-prime -> system
        # dialog -> S01. Locked copy registered in
        # design-system/surfaces/00b-location-permission.md.
        NSLocationWhenInUseUsageDescription: "So we can line up restaurants close enough to walk to, instead of asking your neighborhood every time."
        # Supabase project URL + anon key are injected at build time via
        # build settings (SUPABASE_PROJECT_URL / SUPABASE_ANON_KEY). On the
        # macOS CI runner these come from GitHub secrets; locally they come
        # from `.env`.
        SUPABASE_PROJECT_URL: $(SUPABASE_PROJECT_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.gettoit.GetToIt
        # iPhone-only for v1. iPad scope is deliberately out per the v1 PRD.
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        # Default build number. Local builds and the simulator-test CI
        # lane use "1". The TestFlight upload lane overrides this with
        # $GITHUB_RUN_NUMBER on the xcodebuild command line so each
        # uploaded archive gets a unique CFBundleVersion (substituted
        # into the Info.plist via `$(CURRENT_PROJECT_VERSION)`).
        CURRENT_PROJECT_VERSION: "1"
        # Universal Links — `applinks:gettoit.app` is mirrored in the
        # AASA file at https://gettoit.app/.well-known/apple-app-site-association
        # (TB-00 published it; TB-02 plumbs the iOS side). Entitlement file
        # at `Sources/App/GetToIt.entitlements`.
        CODE_SIGN_ENTITLEMENTS: Sources/App/GetToIt.entitlements
        # Empty-string defaults so the build doesn't fail when the env vars
        # aren't set (e.g. design-system-only PRs). The integration test
        # skips itself in that case.
        SUPABASE_PROJECT_URL: ""
        SUPABASE_ANON_KEY: ""
    dependencies:
      - package: Supabase
        product: Supabase

  GetToItTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      base:
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: GetToIt

schemes:
  GetToIt:
    build:
      targets:
        GetToIt: all
        GetToItTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - GetToItTests
